name: Sync with Upstream
on:
  schedule:
    - cron: '0 11 * * *' # 每天凌晨0点执行
jobs:
  sync_with_upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v3
      - name: Sync with upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: 'https://github.com/qist/tvbox.git' # 上游仓库地址
          upstream_sync_branch: 'main' # 上游分支
          target_sync_branch: 'main' # 目标分支
          test_mode: 'false' # 测试模式，用于调试
      - name: Check for Failure
        if: failure()
        run: echo "[Error] Due to a change in the workflow file of the upstream repository, GitHub has automatically suspended the scheduled automatic update. You need to manually sync your fork."
       
